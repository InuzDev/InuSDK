version: 2

project_name: inusdk

builds:
   - env:
        - CGO_ENABLED=0
     goos:
        - windows
        - linux
        - darwin
     goarch:
        - amd64
        - arm64
     binary: inusdk

archives:
   - formats: ["tar.gz"]
     format_overrides:
        - goos: windows
          formats: ["zip"]
     name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

release:
   github:
      owner: InuzDev
      name: inusdk
